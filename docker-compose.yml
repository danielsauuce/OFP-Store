services:
  mongo:
    image: mongo:7
    container_name: ofp-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
    container_name: ofp-server
    env_file:
      - ./server/.env
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"

  web:
    build:
      context: ./client
    container_name: ofp-web
    depends_on:
      - server
    expose:
      - "5173"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ofp-uptime
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    container_name: ofp-caddy
    depends_on:
      - web
      - server
      - uptime-kuma
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mongo_data:
  kuma_data:
  caddy_data:
  caddy_config:
