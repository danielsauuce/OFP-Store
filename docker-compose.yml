services:
  mongo:
    image: mongo:7
    container_name: ofp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    container_name: ofp-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/categories"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./client
    container_name: ofp-web
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    depends_on:
      - server

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ofp-uptime
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - kuma_data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: ofp-caddy
    restart: unless-stopped
    depends_on:
      - web
      - server
      - uptime-kuma
    ports:
      - "${CADDY_PORT:-80}:${CADDY_PORT:-80}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      CADDY_PORT: ${CADDY_PORT:-80}
      CADDY_AUTO_HTTPS: ${CADDY_AUTO_HTTPS:-off}

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ofp-prometheus
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ofp-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:3002/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_CSRF_ALWAYS_CHECK=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ofp-node-exporter
    restart: unless-stopped
    command:
      - "--no-collector.hwmon"
      - "--no-collector.ipvs"
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ofp-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/:/var/lib/docker:ro

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: ofp-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./observability/prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"

volumes:
  mongo_data:
  kuma_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  server_node_modules:
  client_node_modules:
