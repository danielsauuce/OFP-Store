services:
  server:
    build:
      context: ./server
    container_name: ofp-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/categories"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./client
    container_name: ofp-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    expose:
      - "5173"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ofp-uptime
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    container_name: ofp-caddy
    restart: unless-stopped
    depends_on:
      - web
      - server
      - uptime-kuma
    ports:
      - "${CADDY_PORT:-80}:${CADDY_PORT:-80}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      CADDY_PORT: ${CADDY_PORT:-80}
      CADDY_AUTO_HTTPS: ${CADDY_AUTO_HTTPS:-off}

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ofp-prometheus
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ofp-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ofp-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    expose:
      - "9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ofp-cadvisor
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: ofp-blackbox
    restart: unless-stopped
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    expose:
      - "9115"

volumes:
  kuma_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
