services:
  mongo:
    image: mongo:7
    container_name: ofp-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
    container_name: ofp-server
    env_file:
      - ./server/.env
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"

  web:
    build:
      context: ./client
    container_name: ofp-web
    depends_on:
      - server
    expose:
      - "5173"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ofp-uptime
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    container_name: ofp-caddy
    restart: unless-stopped
    depends_on:
      - web
      - server
      - uptime-kuma
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # stores TLS certificates — must be persistent
      - caddy_config:/config
    environment:
      # Set to your real domain in production, e.g. ofpstore.com
      # Leave unset or set to "localhost" for local Docker dev
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}

  prometheus:
    image: prom/prometheus:latest
    container_name: ofp-prometheus
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"

  grafana:
    image: grafana/grafana:latest
    container_name: ofp-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    expose:
      - "3001"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  mongo_data:
  kuma_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
